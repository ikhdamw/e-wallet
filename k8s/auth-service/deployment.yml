apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ewallet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: ewallet-auth-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: DB_HOST
          value: "mysql"
        - name: DB_PORT
          value: "3306"
        - name: REDIS_HOST
          value: "redis"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ewallet-secrets
              key: jwt-secret
