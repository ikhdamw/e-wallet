apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: ewallet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wallet-service
  template:
    metadata:
      labels:
        app: wallet-service
    spec:
      containers:
      - name: wallet-service
        image: ewallet-wallet-service:latest
        ports:
        - containerPort: 8082
