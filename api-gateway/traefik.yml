# ============================================
# Traefik Configuration
# ============================================

# API Dashboard
api:
  dashboard: true
  insecure: true

# Entrypoints
entryPoints:
  web:
    address: ":80"

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: ewallet-network

# Logging
log:
  level: INFO

# Access Log
accessLog:
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100
